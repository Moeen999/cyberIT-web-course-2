<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Margins in CSS</title>
  </head>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Oxygen,
        Ubuntu,
        Cantarell,
        "Open Sans",
        "Helvetica Neue",
        sans-serif;
    }
    body {
      min-height: 100vh;
      width: 100vw;
    }
    .main-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 10px;
    }
    .container-1 {
      width: 300px;
      height: 300px;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 50px;
    }
    .container-1 i{
        font-size: 24px;
        color: salmon;
    }
    .container-2 {
      width: 300px;
      height: 300px;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-left: 50px;
    }
  </style>

  <body>
    <div class="main-container">
      <div class="container-1">
        <h3>Hi i am container 1</h3>
        <i class="fa-solid fa-mobile"></i>
      </div>
      <div class="container-2"><h3>Hi i am container 2</h3></div>
    </div>
  </body>
</html>
